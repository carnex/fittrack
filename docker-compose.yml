# docker-compose.yml

services:
  db:
    image: postgres:16-alpine      
    restart: unless-stopped
    env_file: .env                   
    ports:
      - "5432:5432"                  
    volumes:
      - postgres_data:/var/lib/postgresql/data  
    healthcheck:                     
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy   

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:                    