version: "2"
sql:
  - schema: "db/migrations"
    queries: "db/queries"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "db/gen"
        overrides:
          - db_type: "numeric"
            go_type: "float64"
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
          - db_type: "numeric"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullFloat64"
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullFloat64"